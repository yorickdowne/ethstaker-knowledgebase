{% extends "base.html" %}

{% block announce %}
  <a href="https://ethstaker.org/forms/staking-landscape-survey-2026" target="_blank">Take the 2026 Staking Landscape Survey!</a>
  <script>
    const expirationDate = "2026-05-23T17:00:00Z"; // UTC time
    const expirationDateObj = new Date(expirationDate);
    const expirationEpoch = Math.floor(expirationDateObj.getTime() / 1000)
    const currentEpoch = Math.floor(Date.now() / 1000);
    const announcementBar = document.querySelector("aside.md-banner");
    if (currentEpoch < expirationEpoch) {
      announcementBar.style.display = "block";
    }


    announcementBar.addEventListener('click', function() {
      window.open('https://ethstaker.org/forms/staking-landscape-survey-2026','_blank');
    });
    announcementBar.addEventListener('mouseover', () => {
        announcementBar.style.cursor = 'pointer';
    });
    announcementBar.addEventListener('mouseout', () => {
        announcementBar.style.cursor = 'default';
    });
  </script>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    (function() {
      // open external links and pdfs in new tab
      const links = document.querySelectorAll("a");
      const currentUrl = window.location.href.split('//')[1].split('/')[0];
      for (let el in links) {
        link = links[el];
        try {
          let targetUrl = link.href;
          // set all absolute links to open in new tab
          if (/^(https?:)?\/\//.test(targetUrl)) {
            link.target = "_blank";
          }
          // if target url contains current domain, use same tab
          if (targetUrl.includes(currentUrl)) {
            link.target = "_self";
          }
          // covers relative and anchor links
          if (!targetUrl.includes("https")) {
            link.target = "_self";
          }
          // open all .pdf, .png, .jpg, .mp4 in new tab
          if (/(\.pdf$|\.png$|\.jpe?g$|\.mp4)/.test(targetUrl)) {
            link.target = "_blank";
          }
        } catch (error) {
          console.error("Target link error:", el);
        }
      }
    })();
  </script>
{% endblock %}
